<h2>Send a Message</h2>

<form aria-label="Contact Form">

<label for="name">Name</label>
<input
type="text"
id="name"
name="name"
required
autocomplete="name">

<label for="email">Email</label>
<input
type="email"
id="email"
name="email"
required
autocomplete="email">

<label for="message">Message</label>
<textarea
id="message"
name="message"
rows="5"
required></textarea>

<button type="submit">Send</button>

</form>

</section>
